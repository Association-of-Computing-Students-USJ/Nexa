<!doctype html>
<html class="dark" lang="en">
  <head>
    <script>
      window.addEventListener('error', function(e) {
        var errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.background = '#800000';
        errorDiv.style.color = '#fff';
        errorDiv.style.padding = '20px';
        errorDiv.style.zIndex = '99999';
        errorDiv.style.fontFamily = 'monospace';
        errorDiv.style.whiteSpace = 'pre-wrap';
        errorDiv.style.fontSize = '14px';
        errorDiv.style.boxShadow = '0 5px 15px rgba(0,0,0,0.5)';
        errorDiv.innerHTML = '<strong>Unhandled Error:</strong><br/>' + e.message + '<br/><br/><strong>Stack:</strong><br/>' + (e.error ? e.error.stack : 'No stack trace');
        document.body.appendChild(errorDiv);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.background = '#800000';
        errorDiv.style.color = '#fff';
        errorDiv.style.padding = '20px';
        errorDiv.style.zIndex = '99999';
        errorDiv.style.fontFamily = 'monospace';
        errorDiv.style.whiteSpace = 'pre-wrap';
        errorDiv.style.fontSize = '14px';
        errorDiv.style.boxShadow = '0 5px 15px rgba(0,0,0,0.5)';
        errorDiv.innerHTML = '<strong>Unhandled Rejection:</strong><br/>' + e.reason + '<br/><br/><strong>Stack:</strong><br/>' + (e.reason && e.reason.stack ? e.reason.stack : 'No stack trace');
        document.body.appendChild(errorDiv);
      });
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Permissions-Policy" content="camera=(self)" />
    <title>Nexa ACS</title>
    <meta name="description" content="NEXA 2026 — Sri Lanka's premier one-day tech talk series by ACS, University of Sri Jayewardenepura." />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/favicon.png" />
    <!-- Fonts used by the landing page -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-[#0e0e0e] text-[#e2e2e2] antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
